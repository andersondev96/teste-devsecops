name: TCC DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  security-scans:
    name: OWASP API Security Scans
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout do Código
        uses: actions/checkout@v4

      - name: 2. Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 3. Instalar Dependências e Ferramentas
        run: |
          python -m pip install --upgrade pip
          pip install -r broken-api/requirements.txt
          pip install bandit safety

      # ==========================================
      # ETAPAS DE SEGURANÇA (DEVSECOPS)
      # ==========================================

      - name: 4. Secret Scanning (Gitleaks)
        # Procura por chaves da AWS e senhas de banco deixadas no código
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: 5. SCA - Análise de Dependências (Safety)
        # Verifica se as bibliotecas no requirements.txt têm CVEs conhecidas
        run: safety check -r broken-api/requirements.txt --output json --save-json sca_report.json || true
        continue-on-error: true

      - name: 6. SAST - Análise Estática (Bandit)
        # Lê o código Python procurando falhas lógicas e de sintaxe insegura
        run: bandit -r broken-api/ -f json -o sast_report.json
        continue-on-error: true

      - name: 7. Build da Imagem Docker
        run: docker build -t vulnerable-api:latest ./broken-api

      - name: 8. Container Scan (Trivy)
        # Escaneia a imagem Docker gerada em busca de falhas no SO base
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'vulnerable-api:latest'
          format: 'json'
          output: 'trivy_report.json'
        continue-on-error: true

      - name: 9. Subir a API para o teste DAST
        # Roda o container em background no GitHub Actions
        run: docker run -d -p 8000:8000 vulnerable-api:latest

      - name: 10. Aguardar API ficar online
        run: sleep 10

      - name: 11. DAST - OWASP ZAP API Scan
        # Simula ataques reais contra os endpoints rodando
        uses: zaproxy/action-api-scan@v0.10.0
        with:
          target: 'http://localhost:8000/openapi.json'
          format: openapi
        continue-on-error: true

      # ==========================================
      # EXTRAÇÃO DE DADOS PARA O SEU FRONTEND
      # ==========================================

      - name: 12. Salvar Relatórios (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: relatorios-seguranca
          path: |
            sca_report.json
            sast_report.json
            trivy_report.json
            report_json.json

      - name: 13. Gerar Resumo para Histórico
        run: |
          # Extrai totais usando o comando 'jq' (já disponível no ambiente do GitHub)
          SAST_TOTAL=$(jq '.results | length' sast_report.json || echo 0)
          SCA_TOTAL=$(jq '.vulnerabilities | length' sca_report.json || echo 0)
          DAST_TOTAL=$(jq '.site[0].alerts | length' report_json.json || echo 0)
          TRIVY_TOTAL=$(jq '[.Results[].Vulnerabilities[]?] | length' trivy_report.json || echo 0)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Cria um objeto JSON com o resumo da execução atual
          echo "{\"date\": \"$TIMESTAMP\", \"sast\": $SAST_TOTAL, \"sca\": $SCA_TOTAL, \"dast\": $DAST_TOTAL, \"trivy\": $TRIVY_TOTAL, \"total\": $((SAST_TOTAL + SCA_TOTAL + DAST_TOTAL + TRIVY_TOTAL))}" > current_summary.json

      - name: 14. Persistir Histórico no Repositório
        run: |
          # Lê o histórico atual, adiciona o novo resumo e mantém apenas as últimas 10 execuções
          jq -s '.[0] + [.[1]] | last(10)' painel-devsecops/src/data/history.json current_summary.json > painel-devsecops/src/data/history.new.json
          mv painel-devsecops/src/data/history.new.json painel-devsecops/src/data/history.json

          # Configura o Git para commitar o arquivo de histórico atualizado
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add painel-devsecops/src/data/history.json
          git commit -m "docs: atualiza histórico de vulnerabilidades [skip ci]"
          git push

      # ==========================================
      # ETAPAS DE DEPLOY AUTOMÁTICO (NOVO)
      # ==========================================

      - name: 15. Copiar Logs Fresquinhos para o Dashboard
        run: |
          mkdir -p painel-devsecops/src/data
          cp sca_report.json painel-devsecops/src/data/ || true
          cp sast_report.json painel-devsecops/src/data/ || true
          cp trivy_report.json painel-devsecops/src/data/ || true
          cp report_json.json painel-devsecops/src/data/ || true

      - name: 16. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 17. Build do Dashboard React
        run: |
          cd painel-devsecops
          npm install
          npm run build

      - name: 18. Preparar Artefatos para o GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './painel-devsecops/dist'

  deploy:
    name: Publicar Dashboard
    needs: security-scans
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Fazer o Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4